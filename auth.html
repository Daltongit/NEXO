<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXO | Acceso</title>
  <meta name="description" content="Ingresa o crea tu cuenta en NEXO." />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/themes.css" />
  <link rel="stylesheet" href="./css/pages/auth.css" />
</head>
<body class="auth-minimal-x">
  <a class="skip-link" href="#auth-main">Saltar al contenido</a>

  <main id="auth-main" class="auth-x-shell">
    <div class="auth-x-bg auth-x-bg-a"></div>
    <div class="auth-x-bg auth-x-bg-b"></div>
    <div class="auth-x-grid"></div>

    <header class="auth-x-header">
      <a class="brand auth-brand" href="./index.html" aria-label="Volver al inicio">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none">
            <path
              d="M14 48V16L50 48V16"
              stroke="currentColor"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
        <span class="brand-text-wrap">
          <span class="brand-text">NEXO</span>
          <span class="brand-subtext">Servicios estudiantiles</span>
        </span>
      </a>

      <div class="auth-x-actions">
        <button
          class="theme-toggle auth-theme-toggle"
          type="button"
          aria-label="Cambiar tema"
          data-theme-toggle
        >
          <span class="theme-toggle-icon"></span>
        </button>

        <a class="auth-x-back" href="./index.html">Volver</a>
      </div>
    </header>

    <section class="auth-x-stage">
      <div class="auth-x-orb auth-x-orb-a" aria-hidden="true"></div>
      <div class="auth-x-orb auth-x-orb-b" aria-hidden="true"></div>
      <div class="auth-x-orb auth-x-orb-c" aria-hidden="true"></div>

      <div class="auth-x-card">
        <div class="auth-x-top">
          <div class="auth-x-badge">
            <span class="auth-x-badge-dot"></span>
            <span>NEXO</span>
          </div>

          <div class="auth-x-toggle" role="tablist" aria-label="Autenticación">
            <button
              class="auth-x-toggle-btn active"
              id="tab-login"
              data-auth-tab="login"
              role="tab"
              aria-selected="true"
              type="button"
            >
              Iniciar sesión
            </button>

            <button
              class="auth-x-toggle-btn"
              id="tab-register"
              data-auth-tab="register"
              role="tab"
              aria-selected="false"
              type="button"
            >
              Crear cuenta
            </button>
          </div>
        </div>

        <div class="auth-status" id="auth-status" aria-live="polite"></div>

        <section
          class="auth-x-panel active"
          id="panel-login"
          role="tabpanel"
          aria-labelledby="tab-login"
        >
          <div class="auth-x-head">
            <h1>Entrar</h1>
          </div>

          <form id="login-form" class="auth-x-form auth-x-login" novalidate>
            <label class="x-field x-field-full">
              <span class="x-input-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <input
                  id="login-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="Correo electrónico"
                  required
                />
                <span class="x-input-line"></span>
              </span>
            </label>

            <label class="x-field x-field-full">
              <span class="x-input-shell x-password-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.8"/>
                  </svg>
                </span>
                <input
                  id="login-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Contraseña"
                  required
                />
                <button
                  class="x-pass-toggle"
                  type="button"
                  data-toggle-password="login-password"
                  aria-label="Mostrar contraseña"
                >
                  <span class="x-pass-eye">
                    <svg class="eye-open" viewBox="0 0 24 24" fill="none">
                      <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                      <circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <svg class="eye-off" viewBox="0 0 24 24" fill="none">
                      <path d="m3 3 18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M10.7 5.2A12 12 0 0 1 12 5c6.4 0 10 7 10 7a16.6 16.6 0 0 1-3.4 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M6.2 6.2C3.7 8 2 12 2 12s3.6 6 10 6a10.5 10.5 0 0 0 5.2-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>
                </button>
                <span class="x-input-line"></span>
              </span>
            </label>

            <button class="x-submit" type="submit">Entrar</button>

            <button class="x-switch-link" type="button" data-switch-auth="register">
              Crear cuenta
            </button>
          </form>
        </section>

        <section
          class="auth-x-panel"
          id="panel-register"
          role="tabpanel"
          aria-labelledby="tab-register"
          hidden
        >
          <div class="auth-x-head">
            <h1>Crear cuenta</h1>
          </div>

          <form id="register-form" class="auth-x-form auth-x-register" novalidate>
            <label class="x-field">
              <span class="x-input-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M5 19c1.5-3 4-4.5 7-4.5S17.5 16 19 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <input
                  id="register-fullname"
                  name="full_name"
                  type="text"
                  autocomplete="name"
                  placeholder="Nombre completo"
                  required
                />
                <span class="x-input-line"></span>
              </span>
            </label>

            <label class="x-field">
              <span class="x-input-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 18c2.2-2 4.6-3 8-3s5.8 1 8 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="1.8"/>
                  </svg>
                </span>
                <input
                  id="register-username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  placeholder="Usuario"
                  required
                />
                <span class="x-input-line"></span>
              </span>
            </label>

            <label class="x-field">
              <span class="x-input-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <input
                  id="register-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="Correo"
                  required
                />
                <span class="x-input-line"></span>
              </span>
            </label>

            <label class="x-field">
              <span class="x-input-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <rect x="4" y="5" width="16" height="15" rx="3" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M8 3v4M16 3v4M4 9h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <input
                  id="register-birthdate"
                  name="birthdate"
                  type="date"
                  required
                />
                <span class="x-input-line"></span>
              </span>
            </label>

            <div class="x-chip-block">
              <div class="x-chip-grid" data-choice-group="career">
                <button type="button" class="x-chip" data-choice-value="Desarrollo de software">Software</button>
                <button type="button" class="x-chip" data-choice-value="Diseño gráfico">Diseño</button>
                <button type="button" class="x-chip" data-choice-value="Marketing digital">Marketing</button>
                <button type="button" class="x-chip" data-choice-value="Idiomas">Idiomas</button>
                <button type="button" class="x-chip" data-choice-value="Fotografía">Foto</button>
                <button type="button" class="x-chip" data-choice-value="Tutorías académicas">Tutorías</button>
              </div>
              <input type="hidden" id="register-career" name="career" required />
            </div>

            <div class="x-chip-block">
              <div class="x-chip-grid" data-choice-group="interest">
                <button type="button" class="x-chip" data-choice-value="Generar ingresos">Ingresos</button>
                <button type="button" class="x-chip" data-choice-value="Ganar experiencia">Experiencia</button>
                <button type="button" class="x-chip" data-choice-value="Crear portafolio">Portafolio</button>
                <button type="button" class="x-chip" data-choice-value="Conseguir clientes">Clientes</button>
                <button type="button" class="x-chip" data-choice-value="Aprender trabajando">Aprender</button>
                <button type="button" class="x-chip" data-choice-value="Visibilidad profesional">Visibilidad</button>
              </div>
              <input type="hidden" id="register-interest" name="interest" required />
            </div>

            <label class="x-field">
              <span class="x-input-shell x-password-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.8"/>
                  </svg>
                </span>
                <input
                  id="register-password"
                  name="password"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Contraseña"
                  minlength="8"
                  required
                />
                <button
                  class="x-pass-toggle"
                  type="button"
                  data-toggle-password="register-password"
                  aria-label="Mostrar contraseña"
                >
                  <span class="x-pass-eye">
                    <svg class="eye-open" viewBox="0 0 24 24" fill="none">
                      <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                      <circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <svg class="eye-off" viewBox="0 0 24 24" fill="none">
                      <path d="m3 3 18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M10.7 5.2A12 12 0 0 1 12 5c6.4 0 10 7 10 7a16.6 16.6 0 0 1-3.4 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M6.2 6.2C3.7 8 2 12 2 12s3.6 6 10 6a10.5 10.5 0 0 0 5.2-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>
                </button>
                <span class="x-input-line"></span>
              </span>
            </label>

            <label class="x-field">
              <span class="x-input-shell x-password-shell">
                <span class="x-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.8"/>
                  </svg>
                </span>
                <input
                  id="register-password-confirm"
                  name="password_confirm"
                  type="password"
                  autocomplete="new-password"
                  placeholder="Confirmar contraseña"
                  minlength="8"
                  required
                />
                <button
                  class="x-pass-toggle"
                  type="button"
                  data-toggle-password="register-password-confirm"
                  aria-label="Mostrar contraseña"
                >
                  <span class="x-pass-eye">
                    <svg class="eye-open" viewBox="0 0 24 24" fill="none">
                      <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                      <circle cx="12" cy="12" r="2.8" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <svg class="eye-off" viewBox="0 0 24 24" fill="none">
                      <path d="m3 3 18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                      <path d="M10.7 5.2A12 12 0 0 1 12 5c6.4 0 10 7 10 7a16.6 16.6 0 0 1-3.4 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M6.2 6.2C3.7 8 2 12 2 12s3.6 6 10 6a10.5 10.5 0 0 0 5.2-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>
                </button>
                <span class="x-input-line"></span>
              </span>
            </label>

            <button class="x-submit x-submit-full" type="submit">Crear cuenta</button>

            <button class="x-switch-link" type="button" data-switch-auth="login">
              Ya tengo cuenta
            </button>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="./js/core/theme.js"></script>
  <script type="module" src="./js/pages/auth-page.js"></script>
  <script type="module" src="./js/supabase/client.js"></script>
  <script type="module" src="./js/auth/session.js"></script>
  <script type="module" src="./js/auth/login.js"></script>
  <script type="module" src="./js/auth/register.js"></script>
</body>
</html>
